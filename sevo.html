<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic Tac Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="sevo.css"/>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">TIC TAC TOE</div>
  </div>

  <div class="scoreboard">
    <div class="score-card" id="scoreX">
      <div class="score-label">Player X</div>
      <div class="score-value" id="scoreXVal">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-card score-card-tie" id="scoreTie">
      <div class="score-label">Tie</div>
      <div class="score-value score-tie-val" id="scoreTieVal">0</div>
    </div>
    <div class="score-vs">VS</div>
    <div class="score-card" id="scoreO">
      <div class="score-label">Player O</div>
      <div class="score-value" id="scoreOVal">0</div>
    </div>
  </div>

  <div class="status turn-x" id="status">
    <div class="status-dot"></div>
    <span id="statusText">X ийн ээлж</span>
  </div>

  <div class="board-wrap">
    <div class="board" id="board"></div>
    <div class="win-line" id="winLine"></div>
  </div>
</div>

<script src="sevo.js"></script>
</body>
</html>
